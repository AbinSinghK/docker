name: deploying an docker container

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        run: echo "${{secrets.DOCKER_PASSWORD}}" | docker login -u "{{secrets.DOCKER_USERNAME}}" --password-stdin

      - name: Build docker image
        run: docker build -t ${{secrets.DOCKER_USERNAME}}/myapp:latest /docker/ .

      - name: Push to DockerHub
        run: docker push ${{DOCKER_USERNAME}}/myapp:latest
      
      - name: deploy to container
        run: |
          docker stop myapp || true
          docker rm myapp || true
          docker run -d -p 80:80 --name myapp ${{secrets.DOCKER_USERNAME}}/myapp:latest
